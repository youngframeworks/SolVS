name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check .vscode/agents duplicates
        run: bash scripts/check_no_vscode_agents_duplicates.sh
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dev requirements
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install -r requirements-dev.txt
      - name: Run repo validation
        run: bash scripts/validate.sh
      - name: Run unit tests
        run: |
          source .venv/bin/activate
          pytest -q

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install linters
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install -r requirements-dev.txt
      - name: Run black check
        run: |
          source .venv/bin/activate
          black --check .
      - name: Run flake8
        run: |
          source .venv/bin/activate
          flake8 .

  agents:
    if: ${{ secrets.COPILOT_PROVIDER_BASE_URL }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Node deps
        run: npm ci
      - name: Run agents discovery tests
        env:
          COPILOT_PROVIDER_BASE_URL: ${{ secrets.COPILOT_PROVIDER_BASE_URL }}
          COPILOT_BYOK_KEY: ${{ secrets.COPILOT_BYOK_KEY }}
        run: npm run test:agents
name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check .vscode/agents duplicates
        run: bash scripts/check_no_vscode_agents_duplicates.sh
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install Python tools
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml pytest black flake8
      - name: Run repo validation
        run: bash scripts/validate.sh
      - name: Validate AGENTS.md
        run: python3 scripts/validate_agents.py
      - name: Lint (black)
        run: python -m black --check . || true
      - name: Lint (flake8)
        run: python -m flake8 || true

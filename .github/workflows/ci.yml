name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install Python tools
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml pytest black flake8
      - name: Run repo validation
        run: bash scripts/validate.sh
      - name: Validate AGENTS.md
        run: python3 scripts/validate_agents.py
      - name: Lint (black)
        run: python -m black --check . || true
      - name: Lint (flake8)
        run: python -m flake8 || true
